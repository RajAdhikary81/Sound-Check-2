services:
  - type: worker
    name: musicbangla-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_DB_URI
        sync: false
      - key: OWNER_ID
        sync: false
      - key: OWNER_USERNAME
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: LOG_GROUP_ID
        sync: false
      - key: SUPPORT_GROUP
        sync: false
      - key: SUPPORT_CHANNEL
        sync: false
      - key: YT_COOKIES
        sync: false
